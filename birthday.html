<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Darsh! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff006e;
            --secondary: #00d9ff;
            --tertiary: #ffbe0b;
            --dark: #0a0e27;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1f3a 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--light);
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridShift 6s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 90vw;
        }

        .header {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            animation: titlePulse 1s ease-out forwards;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 50%, var(--tertiary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes titlePulse {
            0% {
                transform: scale(0.8) translateY(-20px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .name {
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 1rem 0;
            animation: nameGlow 2s ease-out forwards;
            position: relative;
            display: inline-block;
        }

        @keyframes nameGlow {
            0% {
                transform: scale(0.5) rotateX(90deg);
                opacity: 0;
                text-shadow: none;
            }
            100% {
                transform: scale(1) rotateX(0);
                opacity: 1;
                text-shadow: 
                    0 0 20px var(--primary),
                    0 0 40px var(--secondary),
                    0 0 60px var(--tertiary);
            }
        }

        .emoji-container {
            font-size: 4rem;
            margin: 2rem 0;
            animation: floatBounce 3s ease-in-out infinite;
        }

        @keyframes floatBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(15deg); }
            50% { transform: translateY(-40px) rotate(0deg); }
            75% { transform: translateY(-20px) rotate(-15deg); }
        }



        .message {
            font-size: 1.5rem;
            margin-top: 3rem;
            opacity: 0;
            animation: messageAppear 1s ease-out 0.6s forwards;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        @keyframes messageAppear {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .message {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">🎂 Happy Birthday 🎂</div>
        <div class="name">DARSH</div>
        <div class="emoji-container">🎉🎊✨</div>
        
        <div class="message">
            May your day be filled with laughter, joy, and endless celebrations! 🌟
        </div>
    </div>

    </body>
</html>
